# opensearch.yml for security-enabled single-node test container.
# Mounted to /usr/share/opensearch/config/opensearch.yml by OpensearchContainer
# when withSecurityEnabled(true) is called.

cluster.name: opensearch
node.name: opensearch-node1
path.data: /usr/share/opensearch/data
path.logs: /usr/share/opensearch/logs
network.host: 0.0.0.0
discovery.type: single-node

# Transport-layer TLS (PKI certs generated by SecurityPkiFixture and copied at startup)
plugins.security.ssl.transport.pemcert_filepath: node.pem
plugins.security.ssl.transport.pemkey_filepath: node-key.pem
plugins.security.ssl.transport.pemtrustedcas_filepath: root-ca.pem

# HTTP-layer TLS — with optional client-cert auth so both basic-auth and mTLS tests work
plugins.security.ssl.http.enabled: true
plugins.security.ssl.http.pemcert_filepath: node.pem
plugins.security.ssl.http.pemkey_filepath: node-key.pem
plugins.security.ssl.http.pemtrustedcas_filepath: root-ca.pem
plugins.security.ssl.http.clientauth_mode: OPTIONAL

# Allow the self-signed PKI demo certificates used in tests
plugins.security.allow_unsafe_democertificates: true

# Admin DN — must match the admin cert subject generated by SecurityPkiFixture
plugins.security.authcz.admin_dn:
  - CN=admin,O=lenses,L=test,C=GB

plugins.security.audit.type: internal_opensearch
plugins.security.restapi.roles_enabled:
  - all_access
  - security_rest_api_access
